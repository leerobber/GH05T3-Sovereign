name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (gml_kernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gml_kernel

      - name: cargo test
        working-directory: gml_kernel
        run: cargo test

      # Release build of libgml_kernel.so is also an FFI artifact the
      # Python test suite consumes (gh05t3_binary/tests/test_*_ffi.py
      # skip cleanly without it, but run for real when it's present).
      - name: cargo build --release
        working-directory: gml_kernel
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: libgml_kernel-so
          path: gml_kernel/target/release/libgml_kernel.so
          retention-days: 1

  python:
    name: Python tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: libgml_kernel-so
          path: gml_kernel/target/release

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: pytest
        run: python -m pytest backend/oss/tests backend/tests gh05t3_binary/tests -q
