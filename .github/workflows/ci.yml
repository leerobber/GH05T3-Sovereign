name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (gml_kernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-07-07; re-pin periodically to track newer stable Rust)

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: gml_kernel

      - name: cargo test
        working-directory: gml_kernel
        run: cargo test

      # Release build of libgml_kernel.so is also an FFI artifact the
      # Python test suite consumes (gh05t3_binary/tests/test_*_ffi.py
      # skip cleanly without it, but run for real when it's present).
      - name: cargo build --release
        working-directory: gml_kernel
        run: cargo build --release

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: libgml_kernel-so
          path: gml_kernel/target/release/libgml_kernel.so
          retention-days: 1

  python:
    name: Python tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: libgml_kernel-so
          path: gml_kernel/target/release

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: pytest
        run: python -m pytest backend/oss/tests backend/tests gh05t3_binary/tests -q
