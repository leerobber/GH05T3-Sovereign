epochs: 20
batch_size: 8
seq_len: 128
lr: 3e-4
# Scale-up stage 3 (256/4 -> 384/6 -> 512/8 -> this, ~83.2M params):
# first stage verified with a real train/val split (val_fraction below),
# not just training loss -- val loss tracked train loss closely the whole
# run (final: train=6.64, val=6.77, gap only 0.13) and was still
# decreasing smoothly at epoch 20 with no plateau/uptick. No overfitting
# signal at this scale/epoch count; the "loss gets better each stage"
# trend from stages 1-2 appears to reflect real learning, not just
# memorizing the fixed-size corpus. Still well within this machine's 8GB
# VRAM (~333MB fp32 for the model itself). head_dim held at 64.
dim: 768
num_layers: 10
num_heads: 12
binary_ratio: 0.95

# stabilizer: "mgc" (default, MagnitudeGrowthClamper -- hard-clamps
# residual growth to a fixed ratio) or "damg" (DepthAwareMagnitudeGate --
# learns a per-token gate as a function of |x|, |O|, and depth instead).
stabilizer: mgc

# tokenizer: "char" (SimpleCharTokenizer, per-line TextDataset, vocab_size
# fixed at 256) or "bpe" (real subword tokenizer trained on `dataset` if
# tokenizer_path doesn't already exist, TokenStreamDataset for full-corpus
# chunking). vocab_size below is the *requested* BPE vocab -- the actual
# trained vocab may be smaller if the corpus doesn't have enough distinct
# content, and that actual size is what gets used for the model/checkpoint.
tokenizer: bpe
vocab_size: 4096
tokenizer_path: gh05t3_binary/train/checkpoints/tokenizer.json

# Real corpus extracted from local GH05T3 reasoning data via
# `python -m gh05t3_binary.train.prepare_corpus` (backend/data/training/
# reasoning_chains.jsonl -> plaintext). That source file is untracked/
# gitignored -- it's real local data left over from the original backend/
# copy, not something this repo ships. Fall back to data.txt (the tiny
# bundled demo corpus, use tokenizer: char with it) if corpus.txt isn't
# present on your machine.
dataset: gh05t3_binary/train/checkpoints/corpus.txt
checkpoint: gh05t3_binary/train/checkpoints/binary_v2.pt

# val_fraction: 0.0 (default, no validation) or a fraction in (0, 1) held
# out from the *end* of the tokenized corpus for per-epoch validation
# loss (bpe/TokenStreamDataset only). Training loss alone can't tell
# "the model is learning" apart from "the model is memorizing a small
# corpus" -- especially relevant here since we're scaling model capacity
# up while holding the corpus size fixed.
val_fraction: 0.1
